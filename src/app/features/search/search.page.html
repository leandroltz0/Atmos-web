<main class="search-shell font-body" role="main" [attr.aria-busy]="status() === 'loading'">
  <app-search-background />

  <div class="search-container">
    <app-search-header />

    <!-- Banner offline -->
    @if (isOffline()) {
      <div class="state-banner state-banner--offline" role="alert" aria-live="assertive">
        <svg viewBox="0 0 24 24" fill="none" class="state-banner__icon" aria-hidden="true">
          <path d="M3 8.5C8.6 4.2 15.4 4.2 21 8.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M6.5 12.3C10.1 9.6 13.9 9.6 17.5 12.3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M10.2 16.1C11.4 15.2 12.6 15.2 13.8 16.1" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <circle cx="12" cy="19" r="1.4" fill="currentColor"/>
          <path d="M4 4L20 20" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
        </svg>
        Sin conexión — la búsqueda no está disponible ahora
      </div>
    }

    <app-search-field
      [queryControl]="queryControl"
      [hasQuery]="hasQuery()"
      (clear)="clearQuery()"
    />

    <!-- ─── ESTADO: INITIAL — favoritos + búsquedas recientes ─── -->
    @if (status() === 'initial' || (status() === 'writing' && query().length === 0)) {
      <app-search-favorites-section
        [favorites]="favorites()"
        [isLoading]="favoritesLoading()"
        [error]="favoritesError()"
        (selectFavorite)="selectFavoriteCity($event)"
        (removeFavorite)="removeFavorite($event.fav, $event.event)"
        (retry)="retryLoadFavorites()"
      />

      <app-search-recent-section
        [recent]="recent()"
        (selectRecent)="selectRecent($event)"
        (clearRecent)="clearRecent()"
      />
    }

    <!-- ─── ESTADOS: writing, loading, no-results, error, offline ─── -->
    <app-search-status-states
      [status]="status()"
      [query]="query()"
      (retrySearch)="retrySearch()"
    />

    <!-- ─── ESTADO: RESULTS ─── -->
    @if (status() === 'results') {
      <app-search-results
        [results]="results()"
        [favoriteMap]="favoriteMap()"
        (selectCity)="selectCity($event)"
        (toggleFavorite)="toggleFavorite($event.city, $event.event)"
      />
    }
  </div>
</main>
