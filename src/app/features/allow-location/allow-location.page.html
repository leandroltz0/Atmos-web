<div class="allow-location-root" #rootRef>
  <canvas class="bg-canvas" #bgCanvas></canvas>
  <div class="particles-layer" #particlesLayer></div>


  <div class="hero-stage" #heroStage>
    <div class="globe-panel">
      <div class="globe-wrap" #globeWrap>
        <canvas class="globe-canvas" #globeCanvas aria-hidden="true"></canvas>
        <div class="pin-dot" #pinDot></div>
      </div>
    </div>

    <div class="content-panel" #contentPanel>
      <p class="eyebrow atmos-kicker">Location Access</p>

      <h1 class="headline" #headline>
        Know your sky,<br />
        <span class="accent">wherever</span> you are.
      </h1>

      <p class="description atmos-body-copy" #description>
        ATMOS delivers hyperlocal weather — real-time conditions, precise forecasts,
        and smart alerts built around you.
      </p>

      <button
        mat-stroked-button
        type="button"
        class="allow-btn atmos-glass-button"
        #allowBtn
        (click)="onAllowLocation()"
      >
        <ng-container *ngIf="!isLocationGranted; else grantedState">
          <svg
            class="btn-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" />
            <circle cx="12" cy="9" r="2.5" />
          </svg>
          <span>Allow Location</span>
        </ng-container>

        <ng-template #grantedState>
          <svg
            class="btn-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <polyline points="20 6 9 17 4 12" />
          </svg>
          <span>Location Enabled</span>
        </ng-template>
      </button>

      <span class="skip-link" #skipLink (click)="onSkip()">Not now</span>
    </div>
  </div>
</div>
