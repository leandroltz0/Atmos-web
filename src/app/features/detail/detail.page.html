<main class="detail-page">
  <div class="detail-back-bar">
    <button class="detail-back-btn" (click)="goBack()" aria-label="Volver al Dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      <span>Dashboard</span>
    </button>
  </div>

  <section class="detail-hero">
    <p class="detail-hero__eyebrow">Buenos Aires</p>
    <div class="detail-hero__headline">
      <div>
        <h1 class="detail-hero__temp">27°</h1>
        <p class="detail-hero__condition">Mayormente soleado</p>
      </div>
      <p class="detail-hero__range">Max 29° / Min 18°</p>
    </div>
  </section>

  <section class="detail-content">
    <div class="detail-tabs-shell">
      <app-weather-tabs [selectedIndex]="selectedTabIndex" (selectedIndexChange)="setSelectedTab($event)" />
    </div>

    @if (selectedTabIndex === 1) {
      <div class="detail-weekly-shell">
        <app-weekly-tab [weeklyData]="weeklyForecast" />
      </div>
    }

    @if (selectedTabIndex === 2) {
      <app-detail-tab
        [hourlyData]="hourlyTemperatureData"
        [airQuality]="airQuality"
        [atmosphericMetrics]="detailAtmosphericMetrics"
      />
    }

    @if (selectedTabIndex === 0) {
      <app-today-tab
        [highlights]="highlights"
        [hourlyForecast]="hourlyForecast"
        pressureLabel="1014 hPa"
        visibilityLabel="10 km"
        rainLabel="0 mm"
      />
    }
  </section>
</main>
