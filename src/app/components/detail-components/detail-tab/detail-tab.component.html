<section class="detail-tab" aria-label="Detalle del clima">
  <header class="detail-tab__header">
    <p class="detail-tab__eyebrow">Detalle</p>
    <h2 class="detail-tab__title">Weather breakdown</h2>
    <p class="detail-tab__intro">
      Aca vive la lectura profunda del dia: tendencia horaria, lluvia, viento, radiacion,
      calidad del aire y condiciones atmosfericas.
    </p>
  </header>

  <div class="detail-tab__lead">
    <app-hourly-chart [hourlyData]="hourlyData" />
  </div>

  <div class="detail-tab__modules">
    <app-rain-bars-chart />

    <div class="detail-tab__pair">
      <app-wind-rose />
      <app-sun-timeline />
    </div>

    <app-uv-timeline />

    <app-aqi-panel
      [aqi]="airQuality.aqi"
      [pm25]="airQuality.pm25"
      [pm10]="airQuality.pm10"
      [o3]="airQuality.o3"
      [no2]="airQuality.no2"
    />

    <div class="detail-tab__pair detail-tab__pair--bottom">
      <app-moon-phase />

      <app-section-card title="Atmosfera">
        <div class="detail-tab__metrics-grid">
          @for (item of atmosphericMetrics; track item.label) {
            <app-stat-cell [label]="item.label" [value]="item.value" [unit]="item.unit" />
          }
        </div>
      </app-section-card>
    </div>
  </div>
</section>
