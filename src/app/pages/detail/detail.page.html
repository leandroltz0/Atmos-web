<main class="detail-page">
  <section class="detail-hero">
    <p class="detail-hero__eyebrow">Buenos Aires</p>
    <div class="detail-hero__headline">
      <div>
        <h1 class="detail-hero__temp">27°</h1>
        <p class="detail-hero__condition">Mayormente soleado</p>
      </div>
      <p class="detail-hero__range">Max 29° / Min 18°</p>
    </div>
  </section>

  <section class="detail-content">
    <div class="detail-tabs-shell">
      <app-weather-tabs />
    </div>

    <app-section-card title="Overview">
      <div class="metrics-grid">
        @for (item of highlights; track item.label) {
          <article class="metric-tile">
            <span class="metric-tile__label">{{ item.label }}</span>
            <strong class="metric-tile__value">{{ item.value }}</strong>
          </article>
        }
      </div>
    </app-section-card>

    <app-section-card title="Next Hours">
      <div class="forecast-list">
        @for (item of hourlyForecast; track item.hour) {
          <article class="forecast-row">
            <div>
              <p class="forecast-row__hour">{{ item.hour }}</p>
              <p class="forecast-row__state">{{ item.state }}</p>
            </div>
            <strong class="forecast-row__temp">{{ item.temp }}</strong>
          </article>
        }
      </div>
    </app-section-card>

    <app-section-card title="Air Conditions">
      <div class="conditions-grid">
        <div class="condition-chip">
          <span>UV</span>
          <app-uv-badge level="moderate" />
        </div>
        <div class="condition-chip">
          <span>Presion</span>
          <strong>1014 hPa</strong>
        </div>
        <div class="condition-chip">
          <span>Visibilidad</span>
          <strong>10 km</strong>
        </div>
        <div class="condition-chip">
          <span>Lluvia</span>
          <strong>0 mm</strong>
        </div>
      </div>
    </app-section-card>
  </section>
</main>
