<main class="onboarding-shell">
  <div class="space-layer" aria-hidden="true">
    <span
      *ngFor="let star of stars"
      class="star"
      [style.top]="star.top"
      [style.left]="star.left"
      [style.width]="star.size"
      [style.height]="star.size"
      [style.opacity]="star.opacity"
      [style.animation-duration]="star.duration"
      [style.animation-delay]="star.delay"
    ></span>
  </div>

  <section class="onboarding-layout">
    <div class="moon-panel">
      <div class="moon-aura" aria-hidden="true"></div>
      <div #moonScene class="moon-scene">
        <canvas #moonCanvas class="moon-canvas" aria-label="Rotating moon"></canvas>
      </div>
    </div>

    <div class="content-panel">
      <p class="eyebrow">Welcome to</p>
      <h1 class="title">ATMOS</h1>
      <p class="description">
        We're here to keep you updated on the weather,
        so you can plan your day without surprises.
      </p>

      <button mat-stroked-button type="button" class="cta-button">
        GET STARTED
      </button>
    </div>
  </section>
</main>
