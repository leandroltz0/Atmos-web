<main class="onboarding-shell">
  <canvas #bgCanvas class="bg-canvas" aria-hidden="true"></canvas>

  <section class="onboarding-layout">
    <div class="globe-panel">
      <div class="globe-aura" aria-hidden="true"></div>
      <div #globeScene class="globe-scene">
        <canvas #globeCanvas class="globe-canvas" aria-label="Rotating globe"></canvas>
      </div>
    </div>

    <div class="content-panel">
      <p class="eyebrow atmos-kicker">Welcome to</p>
      <h1 class="title">ATMOS</h1>
      <p class="description atmos-body-copy">
        We're here to keep you updated on the weather,
        so you can plan your day without surprises.
      </p>

      <button
        mat-stroked-button
        type="button"
        class="cta-button atmos-glass-button"
        (click)="onGetStarted()"
      >
        Get Started
      </button>
    </div>
  </section>
</main>
